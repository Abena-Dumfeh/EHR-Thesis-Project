      - ../crypto-material/peerOrganizations/patientorg.hospital1.com/peers/peer0.patientorg.hospital1.com/tls:/etc/hyperledger/fabric/tls
      - /var/run/:/host/var/run/
      - ../peer-ledgers/peer0.patientorg.hospital1.com:/var/hyperledger/production
    ports:

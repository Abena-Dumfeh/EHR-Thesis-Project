 # ---------------- CLI CONTAINERS ----------------

  cli.adminorg.hospital1:
    container_name: cli.adminorg.hospital1
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - CORE_PEER_LOCALMSPID=AdminOrgHospital1MSP
      - CORE_PEER_ADDRESS=peer0.adminorg.hospital1.com:7051
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/adminorg.hospital1.com/users/Admin@adminorg.hospital1.com/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/adminorg.hospital1.com/peers/peer0.adminorg.hospital1.com/tls/ca.crt
      - CORE_CHAINCODE_BUILDER=external
      - CORE_CHAINCODE_LAUNCHER=external
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    volumes:
      - ../crypto-material:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto 
      - ../channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
      - ../chaincode:/opt/gopath/src/github.com/hyperledger/fabric/peer/chaincode
      - /var/run/docker.sock:/var/run/docker.sock
#      - ../ehr.tar.gz:/opt/gopath/src/github.com/hyperledger/fabric/peer/ehr.tar.gz
    depends_on:
      - orderer1.example.com
      - peer0.adminorg.hospital1.com
    networks:
      - ehr_network


  peer0.adminorg.hospital1.com:
    container_name: peer0.adminorg.hospital1.com
    image: hyperledger/fabric-peer:2.5.12
    environment:
      - CORE_PEER_ID=peer0.adminorg.hospital1.com
      - CORE_PEER_ADDRESS=peer0.adminorg.hospital1.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.adminorg.hospital1.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.adminorg.hospital1.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.adminorg.hospital1.com:7051
      - CORE_PEER_LOCALMSPID=AdminOrgHospital1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=docker_ehr_network
   #   - CORE_CHAINCODE_BUILDER=external
   #   - CORE_CHAINCODE_LAUNCHER=external
   #   - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    volumes:
      - ../crypto-material/peerOrganizations/adminorg.hospital1.com/peers/peer0.adminorg.hospital1.com/msp:/etc/hyperledger/fabric/msp
      - ../crypto-material/peerOrganizations/adminorg.hospital1.com/peers/peer0.adminorg.hospital1.com/tls:/etc/hyperledger/fabric/tls
      - /var/run/:/host/var/run/
      - ../peer-ledgers/peer0.adminorg.hospital1.com:/var/hyperledger/production
    ports:
      - 7051:7051
    depends_on:
      - orderer1.example.com
    networks:


 <!DOCTYPE html>
<html lang="en">
<head>
  <title>LoginPage</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<!-- Full-page background container -->
<div class="container-fluid" style="position: relative; min-height: 100vh; background-image: url('images/doctor1.png'); background-size: cover; background-position: center;">

  <!-- Tint overlay to fade background -->
  <div style="position: absolute; top: 0; left: 0; height: 100%; width: 100%; background-color: rgba(255,255,255,0.3); z-index: 1;"></div>

  <!-- Centered image with form on top -->
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; position: relative; z-index: 2;">
    
    <!-- Image as a background layer -->
    <div style="position: relative; width: 600px; height: 800px;">
      <img src="images/doctor1.png" alt="3D Center Image" class="img-fluid" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">

      <!-- Login form on top of the image -->
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.2);">

        <form>
          <!-- Email or ID Field -->
          <div class="form-group mb-3">
            <label for="identifier">Email or ID</label>
            <div class="input-group">
              <div class="input-group-prepend">
                <span class="input-group-text">
                  <i class="fas fa-user"></i>
                </span>
              </div>
              <input type="text" class="form-control faded-input" id="identifier" placeholder="Enter your email or ID">
            </div>
          </div>

          <!-- Password Field -->
          <div class="form-group mb-3">
            <label for="password">Password</label>
            <div class="input-group">
              <div class="input-group-prepend">
                <span class="input-group-text">
                  <i class="fas fa-lock"></i>
                </span>
              </div>
              <input type="password" class="form-control faded-input" id="password" placeholder="Enter your password">
            </div>
          </div>

          <!-- Login Button -->
          <div class="d-flex justify-content-center">
            <button type="submit" class="btn btn-outline-light text-dark">Login</button>
          </div>
        </form>
            <p><a href="{{ url_for('doctor_bp.register') }}">Don't have an account? Register</a></p>
      </div>
    </div>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload and Share Electronic Health Record (FHIR)</title>
    <script>
        function toggleReceiver() {
            const receiverType = document.querySelector('input[name="receiver_type"]:checked').value;
            document.getElementById('patient_section').style.display = receiverType === 'patient' ? 'block' : 'none';
            document.getElementById('doctor_section').style.display = receiverType === 'doctor' ? 'block' : 'none';
        }
    </script>
</head>
<body>
    <h2>Upload and Share Electronic Health Record (FHIR)</h2>

    <form method="POST" enctype="multipart/form-data">
        <label>Send To:</label><br>
        <input type="radio" name="receiver_type" value="patient" checked onchange="toggleReceiver()"> Patient
        <input type="radio" name="receiver_type" value="doctor" onchange="toggleReceiver()"> Doctor
        <br><br>

        <!-- Select Patient Section -->
        <div id="patient_section">
            <label>Select Patient:</label><br>
            <select name="patient_id">
                {% for patient in patients %}
                    <option value="{{ patient.patient_id }}">{{ patient.name }} ({{ patient.email }})</option>
                {% endfor %}
            </select><br><br>
        </div>

        <!-- Select Doctor Section -->
        <div id="doctor_section" style="display: none;">
            <label>Select Doctor's Department:</label><br>
            <select name="doctor_dept">
                {% for dept in departments %}
                    <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}
            </select><br><br>

            <label>Select Doctor:</label><br>
            <select name="target_doctor_id">
                {% for doctor in doctors %}
                    <option value="{{ doctor.doctor_id }}">{{ doctor.name }} ({{ doctor.email }})</option>
                {% endfor %}
            </select><br><br>

            <label>Patient Consent (required):</label><br>
            <input type="checkbox" name="consent_given" required> I have the patient's consent to share this data with another doctor.
            <br><br>
        </div>

        <label>Record Type (e.g., Observation, Procedure):</label><br>
        <input type="text" name="record_type" required placeholder="Observation, Procedure, etc."><br><br>

        <label>Upload EHR File:</label><br>
        <input type="file" name="ehr_file" accept=".txt,.json,.pdf" required><br><br>

        <label>Doctor's Notes:</label><br>
        <textarea name="notes" rows="4" cols="50" placeholder="Add any relevant comments or explanation..."></textarea><br><br>

        <input type="submit" value="Upload Record">
    </form>

    <p><a href="{{ url_for('doctor_bp.dashboard') }}">Back to Dashboard</a></p>

    <script>toggleReceiver();</script>
</body>
</html>

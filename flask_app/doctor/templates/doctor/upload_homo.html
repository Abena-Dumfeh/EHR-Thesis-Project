<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload Vital Signs</title>
</head>
<body>
    <h2>Upload Vital signs</h2>
    <form method="POST">
        <label for="ehr_id">EHR ID:</label><br>
        <input type="text" name="ehr_id" required><br><br>

        <label for="patient_id">Patient ID:</label><br>
        <input type="text" name="patient_id" required><br><br>

        <label for="bp">Blood Pressure:</label><br>
        <input type="number" step="any" name="bp" required><br><br>

        <label for="glucose">Glucose Level:</label><br>
        <input type="number" step="any" name="glucose" required><br><br>

        <label for="cholesterol">Cholesterol:</label><br>
        <input type="number" step="any" name="cholesterol" required><br><br>

        <label for="notes">Notes (optional):</label><br>
        <textarea name="notes" rows="4" cols="50"></textarea><br><br>

        <input type="submit" value="Upload Record">
    </form>

    <p><a href="{{ url_for('doctor_bp.dashboard') }}">← Back to Dashboard</a></p>
</body>
</html>

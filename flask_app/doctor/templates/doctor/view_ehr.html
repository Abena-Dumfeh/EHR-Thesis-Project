<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View EHR Record</title>
</head>
<body>
    <h2>EHR Record Details</h2>

    <table border="1">
        <tr><th>EHR Key</th><td>{{ ehr.EHRID }}</td></tr>
        <tr><th>Patient</th><td>{{ ehr.PatientID }}</td></tr>
        <tr><th>Doctor</th><td>{{ ehr.DoctorID }}</td></tr>
        <tr><th>Record Type</th><td>{{ ehr.RecordType }}</td></tr>
        <tr><th>IPFS CID</th><td>{{ ehr.IPFSCID }}</td></tr>
        <tr><th>CKKS CID</th><td>{{ ehr.CKKSCID or "N/A" }}</td></tr>
        <tr><th>Created By</th><td>{{ ehr.CreatedBy }}</td></tr>
        <tr><th>Created At</th><td>{{ ehr.CreatedAt }}</td></tr>
    </table>

    <p><a href="{{ url_for('doctor_bp.dashboard') }}">← Back to Dashboard</a></p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
</head>
<body>
    <h2>Edit Your Profile</h2>
    <form method="POST">
        <label>Contact:</label><br>
        <input type="text" name="contact" value="{{ patient.contact }}"><br>

        <label>Address:</label><br>
        <input type="text" name="address" value="{{ patient.address }}"><br><br>

        <input type="submit" value="Update">
    </form>
    <p><a href="{{ url_for('patient_bp.dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
